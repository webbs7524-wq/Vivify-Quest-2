name: NDK build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.3.4) - leave empty to just build'
        required: false
        default: ''
  push:
    tags:
      - "v*"
    branches:
      - 'master'
      - 'main'
      - 'dev/*'
      - 'feat/*'
      - 'fix/*'
    paths-ignore:
      - '**.yml'
      - '!.github/workflows/build-ndk.yml'
      - '**.json'
      - '!qpm.json'
      - '!qpm.shared.json'
      - '!mod.template.json'
      - '**.txt'
      - '!CMakeLists.txt'
      - '**.ps1'
      - '!build.ps1'
      - '!createqmod.ps1'
      - '**.md'
      - '.gitignore'
  pull_request:
    branches:
      - 'master'
      - 'main'
      - 'dev/*'
      - 'feat/*'
      - 'fix/*'

env:
  module_id: "Vivify"
  qmod_name: "Vivify"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        name: Checkout
        with:
          submodules: true
          lfs: true

      - uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27

      - name: Create ndkpath.txt
        run: |
          echo ${{ steps.setup-ndk.outputs.ndk-path }} > ${GITHUB_WORKSPACE}/ndkpath.txt
          cat ${GITHUB_WORKSPACE}/ndkpath.txt

      - name: Extract version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG="v${VERSION}"
          else
            VERSION=$(cat qpm.json | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")
            TAG="v${VERSION}"
          fi
          echo "TAG=${TAG}" >> ${GITHUB_OUTPUT}
          echo "VERSION=${VERSION}" >> ${GITHUB_OUTPUT}
          echo "IS_RELEASE=${{ startsWith(github.ref, 'refs/tags/v') || github.event.inputs.version != '' }}" >> ${GITHUB_OUTPUT}

      - name: Setup qpm
        run: |
          curl -SL "https://github.com/QuestPackageManager/QPM.CLI/releases/download/v1.5.9/qpm-linux-x64.zip" -o /tmp/qpm.zip
          unzip /tmp/qpm.zip -d /tmp/qpm
          mv /tmp/qpm/qpm /usr/local/bin/qpm
          chmod +x /usr/local/bin/qpm
          qpm restore

      - name: Upload BS headers
        uses: actions/upload-artifact@v4
        with:
          name: bs-cordl-headers
          path: |
            extern/includes/bs-cordl/include/GlobalNamespace/zzzz__GameNoteController_def.hpp
            extern/includes/bs-cordl/include/GlobalNamespace/zzzz__BombNoteController_def.hpp
            extern/includes/bs-cordl/include/GlobalNamespace/zzzz__NoteController_def.hpp
            extern/includes/bs-cordl/include/GlobalNamespace/zzzz__SaberModelController_def.hpp
            extern/includes/bs-cordl/include/GlobalNamespace/zzzz__NoteData_def.hpp
            extern/includes/bs-cordl/include/GlobalNamespace/zzzz__Saber_def.hpp
            extern/includes/bs-cordl/include/GlobalNamespace/zzzz__NoteMovement_def.hpp
            extern/includes/bs-cordl/include/GlobalNamespace/zzzz__BurstSliderGameNoteController_def.hpp
          if-no-files-found: warn

      - name: Build & Create Qmod
        run: |
          cd ${GITHUB_WORKSPACE}
          qpm s qmod

      - name: Get Library Name
        id: libname
        run: |
          cd ./build/
          pattern="lib${module_id}*.so"
          files=( $pattern )
          echo "NAME=${files[0]}" >> ${GITHUB_OUTPUT}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.libname.outputs.NAME }}
          path: ./build/${{ steps.libname.outputs.NAME }}
          if-no-files-found: error

      - name: Upload qmod artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.qmod_name }}.qmod
          path: ./${{ env.qmod_name }}.qmod
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.version != ''
        uses: softprops/action-gh-release@v0.1.15
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Vivify Quest ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ./build/${{ steps.libname.outputs.NAME }}
            ./${{ env.qmod_name }}.qmod
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
